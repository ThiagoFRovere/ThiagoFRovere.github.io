<div class="cart-modal" id="cart-modal">
    <div class="cart-header">
        <h3>Seu Carrinho</h3>
        <i class="fas fa-times" id="close-cart" style="cursor: pointer;"></i>
    </div>
    <div class="cart-items" id="cart-items">
        <!-- Cart items will be loaded here -->
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>Total:</span>
            <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="btn btn-primary" id="checkout-btn" style="width: 100%;">FINALIZAR PEDIDO VIA WHATSAPP</button>
    </div>
</div>
