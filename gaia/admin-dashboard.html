<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gaia Artesanato</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/HF.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header id="header-placeholder"></header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Painel de Controle - Produtos</h2>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="user-email" style="font-size: 0.9em; color: #666;"></span>
                <button class="btn-logout" id="logout-btn">Sair</button>
            </div>
        </div>

        <button class="btn-add-product" id="add-product-btn">
            <i class="fas fa-plus"></i> Novo Produto
        </button>

        <div style="overflow-x: auto;">
            <table class="products-table">
                <thead>
                    <tr>
                        <th>Imagem</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço Varejo</th>
                        <th>Preço Atacado</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="products-list">
                    <!-- Produtos serão carregados aqui -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Produto -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Novo Produto</h3>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="name">Nome do Produto</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Categoria</label>
                        <input type="text" id="category" required list="category-list">
                        <datalist id="category-list">
                            <option value="Incensários">
                            <option value="Estátuas">
                            <option value="Cristais">
                            <option value="Decoração">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label for="image">URL da Imagem</label>
                        <input type="text" id="image" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="retail_price">Preço Varejo (R$)</label>
                        <input type="number" id="retail_price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="wholesale_price">Preço Atacado (R$)</label>
                        <input type="number" id="wholesale_price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="min_wholesale_quantity">Mín. Atacado (un.)</label>
                        <input type="number" id="min_wholesale_quantity" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="stock">Estoque Atual</label>
                        <input type="number" id="stock" value="0" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Peso (ex: 200g)</label>
                        <input type="text" id="weight">
                    </div>
                    <div class="form-group">
                        <label for="dimensions">Dimensões (ex: 10x5x5cm)</label>
                        <input type="text" id="dimensions">
                    </div>
                </div>
                <button type="submit" class="btn-save">Salvar Produto</button>
            </form>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-green);"></i>
        <p style="margin-top: 15px; font-weight: bold;">Processando...</p>
    </div>

    <footer id="footer-placeholder"></footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/inject-header.js"></script>
    <script src="js/inject-footer.js"></script>
    <script src="js/admin-dashboard.js"></script>
    
</body>
</html>
