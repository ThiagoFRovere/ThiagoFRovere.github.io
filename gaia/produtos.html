<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Gaia Artesanato</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/HF.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="header"></div>
    </header>

    <main>
        <section class="page-header">
            <div class="container2">
                <h1>Nossos Produtos</h1>
                <p>Confira toda a nossa coleção de artesanato em cimento</p>
            </div>
        </section>

        <section class="products-section container2">
            <div class="products-container">
                <!-- Sidebar de Filtros -->
                <aside class="filters-sidebar">
                    <h3>Filtrar por Categoria</h3>
                    <div class="filter-list" id="category-filters">
                        <!-- Categorias serão injetadas aqui pelo JavaScript -->
                    </div>
                </aside>

                <!-- Grid de Produtos -->
                <div class="products-main">
                    <div class="products-header">
                        <h2 id="category-title">Todos os Produtos</h2>
                        <div class="sort-options">
                            <label for="sort">Ordenar por:</label>
                            <select id="sort">
                                <option value="name">Nome (A-Z)</option>
                                <option value="price-asc">Menor Preço</option>
                                <option value="price-desc">Maior Preço</option>
                                <option value="newest">Mais Recentes</option>
                            </select>
                        </div>
                    </div>
                    <div class="product-grid" id="products-grid">
                        <!-- Produtos serão injetados aqui pelo JavaScript -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>

    <!-- Cart Modal -->
    <div class="overlay" id="overlay"></div>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <i class="fas fa-times" id="close-cart" style="cursor: pointer;"></i>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be loaded here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="btn btn-primary" id="checkout-btn" style="width: 100%;">FINALIZAR PEDIDO VIA WHATSAPP</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/inject-header.js"></script>
    <script src="js/inject-footer.js"></script>
    <script src="js/script-produtos.js"></script>
</body>
</html>
