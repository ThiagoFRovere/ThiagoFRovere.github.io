<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo - Gaia Artesanato</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/HF.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="header"></div>
    </header>

    <main>
        <section class="hero" style="padding: 40px 0; text-align: center;">
            <div class="container">
                <h1 style="font-size: 2.5em; margin-bottom: 10px;">Catálogo Completo</h1>
                <p style="font-size: 1.1em; color: var(--gray-text);">Explore todos os nossos produtos artesanais em cimento</p>
            </div>
        </section>

        <section class="container2">
            <div class="catalog-container">
                <!-- Sidebar com Filtros -->
                <aside class="catalog-sidebar">
                    <div class="sidebar-section">
                        <h3><i class="fas fa-search"></i> Buscar</h3>
                        <input type="text" id="search-input" class="search-box" placeholder="Digite o nome do produto...">
                    </div>

                    <div class="sidebar-section">
                        <h3><i class="fas fa-filter"></i> Categorias</h3>
                        <div id="category-filters">
                            <!-- Categorias serão carregadas dinamicamente -->
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3><i class="fas fa-sort"></i> Ordenar por</h3>
                        <select id="sort-select" class="sort-select">
                            <option value="default">Padrão</option>
                            <option value="name">Nome (A-Z)</option>
                            <option value="price-asc">Menor Preço</option>
                            <option value="price-desc">Maior Preço</option>
                            <option value="stock">Em Estoque</option>
                        </select>
                    </div>

                    <div class="sidebar-section">
                        <h3><i class="fas fa-redo"></i> Filtros</h3>
                        <div class="filter-option">
                            <label>
                                <input type="checkbox" id="filter-in-stock" checked>
                                <span>Em Estoque</span>
                            </label>
                        </div>
                        <div class="filter-option">
                            <label>
                                <input type="checkbox" id="filter-wholesale">
                                <span>Com Preço Atacado</span>
                            </label>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="clear-filters" style="width: 100%; margin-top: 20px;">
                        <i class="fas fa-times"></i> Limpar Filtros
                    </button>
                </aside>

                <!-- Conteúdo Principal -->
                <div class="catalog-main">
                    <div class="catalog-header">
                        <h1>Todos os Produtos</h1>
                        <span class="results-count">Mostrando <strong id="results-count">0</strong> produtos</span>
                    </div>

                    <div class="catalog-grid" id="catalog-grid">
                        <!-- Produtos serão carregados aqui -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div id="footer"></div>
    </footer>

    <!-- Cart Modal -->
    <div class="overlay" id="overlay"></div>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <i class="fas fa-times" id="close-cart" style="cursor: pointer;"></i>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be loaded here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="btn btn-primary" id="checkout-btn" style="width: 100%;">FINALIZAR PEDIDO VIA WHATSAPP</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/inject-header.js"></script>
    <script src="js/inject-footer.js"></script>
    <script src="js/script-catalogo.js"></script>
</body>
</html>
