<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Gaia Artesanato</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/HF.css">
    <link rel="stylesheet" href="css/login-admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>
    
    <header id="header-placeholder"></header>

    <div class="container">
        <div class="login-container">
            <h2>Acesso Administrativo</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn-login">Entrar</button>
                <p id="error-message"></p>
            </form>
        </div>
    </div>

    <footer id="footer-placeholder"></footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/inject-header.js"></script>
    <script src="js/inject-footer.js"></script>
    <script src="js/login-admin.js"></script>

</body>
</html>
